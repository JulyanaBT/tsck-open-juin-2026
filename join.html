<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Activation compte — Open Beach Tennis TSCK</title>

  <style>
    :root{
      --palm:#0b7a3b;
      --palm-dark:#064d28;
      --palm-light:#15a658;
      --navy:#06284a;
      --navy-dark:#03172b;
      --sun:#ffd21f;
      --sun-dark:#f3b800;
      --sand-light:#fff4d4;
      --text:#17212b;
      --muted:#667085;
      --shadow:0 16px 40px rgba(16,24,40,.12);
      --header-h:150px;
      --container:1180px;
    }

    *{box-sizing:border-box;}

    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 10% 0%, rgba(255,210,31,.22), transparent 26%),
        radial-gradient(circle at 90% 8%, rgba(11,122,59,.18), transparent 26%),
        linear-gradient(180deg,#eaf9ff 0%,#fff4d4 52%,#fff 100%);
      min-height:100vh;
    }

    img{display:block;max-width:100%;}

    .container{
      width:min(var(--container), calc(100% - 28px));
      margin:0 auto;
    }

    .site-header{
      position:fixed;
      top:0;
      left:0;
      right:0;
      z-index:1000;
      background:
        radial-gradient(circle at 8% 0%, rgba(255,210,31,.30), transparent 28%),
        linear-gradient(135deg,var(--palm-dark),var(--palm),var(--palm-light));
      box-shadow:0 10px 26px rgba(6,77,40,.34);
      border-bottom:4px solid var(--sun);
    }

    .header-inner{
      min-height:var(--header-h);
      display:grid;
      grid-template-columns:80px 1fr 80px;
      align-items:center;
      gap:10px 18px;
      padding:12px 0;
    }

    .header-logo{
      width:80px;
      height:80px;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:22px;
      background:rgba(255,255,255,.12);
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.18);
    }

    .header-logo img{
      max-width:100%;
      max-height:100%;
      object-fit:contain;
      filter:drop-shadow(0 6px 10px rgba(0,0,0,.22));
    }

    .header-title{
      text-align:center;
      color:#fff;
      text-shadow:0 6px 18px rgba(0,0,0,.26);
    }

    .header-title strong{
      display:block;
      font-size:clamp(24px,5vw,44px);
      line-height:.95;
      letter-spacing:-.04em;
      text-transform:uppercase;
      font-weight:1000;
    }

    .header-title span{
      display:block;
      margin-top:8px;
      font-size:13px;
      font-weight:1000;
      color:var(--sun);
      text-transform:uppercase;
      letter-spacing:.12em;
    }

    main{
      min-height:100vh;
      padding-top:calc(var(--header-h) + 28px);
      padding-bottom:38px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .card{
      width:min(520px, 100%);
      background:rgba(255,255,255,.96);
      border:1px solid rgba(255,255,255,.65);
      border-radius:30px;
      box-shadow:var(--shadow);
      padding:24px;
      display:grid;
      gap:16px;
    }

    .card-head{
      text-align:center;
      display:grid;
      gap:8px;
    }

    h1{
      margin:0;
      font-size:clamp(28px,7vw,42px);
      line-height:1;
      letter-spacing:-.04em;
      font-weight:1000;
      color:var(--navy-dark);
    }

    .sub{
      margin:0;
      color:var(--muted);
      font-size:15px;
      line-height:1.45;
      font-weight:700;
    }

    .field{
      display:grid;
      gap:8px;
    }

    .field label{
      font-weight:1000;
      color:#1c2430;
    }

    input{
      width:100%;
      min-height:56px;
      border-radius:18px;
      border:1px solid rgba(16,24,40,.12);
      background:#fff;
      padding:0 15px;
      font-size:16px;
      color:#17212b;
      outline:none;
      font-family:inherit;
      font-weight:700;
    }

    input:focus{
      border-color:rgba(11,122,59,.55);
      box-shadow:0 0 0 4px rgba(11,122,59,.12);
    }

    .password-wrap{
      position:relative;
    }

    .password-wrap input{
      padding-right:58px;
    }

    .eye-btn{
      position:absolute;
      right:8px;
      top:50%;
      transform:translateY(-50%);
      width:42px;
      height:42px;
      border:none;
      border-radius:999px;
      background:#fff4d4;
      color:var(--navy-dark);
      font-size:20px;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0;
    }

    .btn{
      appearance:none;
      border:none;
      min-height:58px;
      border-radius:18px;
      padding:14px 18px;
      font-size:16px;
      font-weight:1000;
      cursor:pointer;
      background:linear-gradient(180deg,var(--sun),var(--sun-dark));
      color:var(--navy-dark);
      box-shadow:0 12px 22px rgba(255,210,31,.22);
    }

    .btn:disabled{
      opacity:.55;
      cursor:not-allowed;
    }

    .status{
      min-height:22px;
      text-align:center;
      color:var(--muted);
      font-size:15px;
      font-weight:800;
      line-height:1.45;
    }

    .status.ok{color:#087a35;}
    .status.err{color:#a32323;}

    @media (min-width:760px){
      :root{--header-h:158px;}

      .header-inner{
        grid-template-columns:100px 1fr 100px;
      }

      .header-logo{
        width:96px;
        height:80px;
      }

      .card{
        padding:28px;
      }
    }
  </style>
</head>

<body>

<header class="site-header">
  <div class="container header-inner">
    <div class="header-logo">
      <img src="assets/img/logo-tsck.png" alt="Tennis Squash Club de Kourou">
    </div>

    <div class="header-title">
      <strong>Activation<br>Compte</strong>
      <span>Open Beach Tennis TSCK</span>
    </div>

    <div class="header-logo">
      <img src="assets/img/logo-julyana.png" alt="Jul’Yana BT">
    </div>
  </div>
</header>

<main class="container">
  <div class="card">

    <div class="card-head">
      <h1>🎾 Activation compte</h1>
      <p class="sub">
        Renseigne ton email et choisis ton mot de passe pour activer ton accès organisateur.
      </p>
    </div>

    <div class="field">
      <label for="email">Email</label>
      <input id="email" type="email" placeholder="ton.email@exemple.com" autocomplete="email" required>
    </div>

    <div class="field">
      <label for="password">Mot de passe</label>
      <div class="password-wrap">
        <input id="password" type="password" placeholder="Minimum 6 caractères" autocomplete="new-password" required>
        <button class="eye-btn" id="togglePassword" type="button" aria-label="Afficher ou masquer le mot de passe">👁️</button>
      </div>
    </div>

    <button class="btn" id="btnCreate">Créer mon compte</button>

    <div class="status" id="status"></div>
  </div>
</main>

<script type="module">
  import { auth, db } from "./assets/js/firebase.js?v=tsck-join1";

  import {
    createUserWithEmailAndPassword
  } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

  import {
    doc,
    getDoc,
    setDoc,
    updateDoc,
    serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

  const statusEl = document.getElementById("status");
  const btn = document.getElementById("btnCreate");
  const emailEl = document.getElementById("email");
  const passwordEl = document.getElementById("password");
  const togglePassword = document.getElementById("togglePassword");

  const params = new URLSearchParams(window.location.search);
  const inviteId = params.get("invite");

  function setStatus(message, type = ""){
    statusEl.textContent = message;
    statusEl.className = "status";
    if(type) statusEl.classList.add(type);
  }

  togglePassword.addEventListener("click", () => {
    const visible = passwordEl.type === "text";
    passwordEl.type = visible ? "password" : "text";
    togglePassword.textContent = visible ? "👁️" : "🙈";
  });

  if(!inviteId){
    setStatus("❌ Lien d’invitation invalide.", "err");
    btn.disabled = true;
  }

  btn.addEventListener("click", async () => {
    const email = emailEl.value.trim();
    const password = passwordEl.value;

    if(!email || !password){
      setStatus("❌ Email et mot de passe requis.", "err");
      return;
    }

    if(password.length < 6){
      setStatus("❌ Le mot de passe doit contenir au moins 6 caractères.", "err");
      return;
    }

    btn.disabled = true;
    btn.textContent = "Activation en cours…";
    setStatus("Vérification de l’invitation…");

    try{
      const inviteRef = doc(db, "invites", inviteId);
      const inviteSnap = await getDoc(inviteRef);

      if(!inviteSnap.exists()){
        throw new Error("Invitation introuvable ou expirée.");
      }

      const invite = inviteSnap.data() || {};

      if(invite.status && invite.status !== "pending"){
        throw new Error("Cette invitation a déjà été utilisée.");
      }

      if(invite.code && invite.code !== "TSCK2026"){
        throw new Error("Code invitation invalide.");
      }

      setStatus("Création du compte…");

      const cred = await createUserWithEmailAndPassword(auth, email, password);
      const user = cred.user;

      setStatus("Attribution du rôle…");

      await setDoc(doc(db, "roles", user.uid), {
        uid: user.uid,
        email: email,
        label: invite.label || "",
        role: invite.role || "arbitre",
        eventId: "tsck-open-juin-2026",
        inviteId: inviteId,
        createdAt: serverTimestamp(),
        updatedAt: serverTimestamp()
      });

      await updateDoc(inviteRef, {
        status: "used",
        usedAt: serverTimestamp(),
        usedBy: user.uid,
        email: email
      });

      setStatus("✅ Compte activé ! Redirection…", "ok");

      setTimeout(() => {
        window.location.href = "index.html";
      }, 1200);

    }catch(error){
      console.error(error);

      let message = error?.message || "Erreur inconnue.";

      if(error?.code === "auth/email-already-in-use"){
        message = "Cet email est déjà utilisé. Essaie de te connecter avec ce compte.";
      }

      if(error?.code === "auth/invalid-email"){
        message = "Adresse email invalide.";
      }

      if(error?.code === "auth/weak-password"){
        message = "Mot de passe trop faible : minimum 6 caractères.";
      }

      setStatus("❌ " + message, "err");
      btn.disabled = false;
      btn.textContent = "Créer mon compte";
    }
  });
</script>

</body>
</html>
