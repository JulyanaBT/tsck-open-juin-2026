<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Règlement - Open Beach Tennis TSCK</title>

<style>
:root{
  --bg:#f4f8fb;
  --card:#ffffff;
  --text:#17212b;
  --blue:#075b9a;
  --clay:#c65a1e;
  --shadow:0 16px 40px rgba(16,24,40,.12);
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
}

main{
  max-width:900px;
  margin:auto;
  padding:190px 20px 40px;
}

.card{
  background:var(--card);
  border-radius:24px;
  padding:40px 30px;
  text-align:center;
  box-shadow:var(--shadow);
}

h1{
  margin:0 0 15px;
  color:var(--clay);
}

p{
  font-size:18px;
  line-height:1.6;
}

.small{
  color:#667085;
  font-size:14px;
}
</style>
</head>

<body>

<div id="publicHeader"></div>

<main>
  <div class="card">
    <h1>📘 Règlement</h1>

    <p>
      Le règlement du tournoi sera publié prochainement.
    </p>

    <p>
      Vous y retrouverez les formats des rencontres, les modalités d'inscription, les règles sportives et les informations relatives à l'organisation.
    </p>

    <p class="small">
      Open Beach Tennis TSCK – 28 juin 2026
    </p>
  </div>
</main>

<script src="../assets/js/public-header.js"></script>

</body>
</html>
